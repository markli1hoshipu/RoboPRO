# Vision perturbation — PIXEL SHAKE ONLY (per-frame random pixel shift)
render_freq: 0
episode_num: 3
use_seed: false
save_freq: 15
embodiment: [aloha-agilex]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
  obstacle_density: 0

  vision_perturbation:
    lighting:
      enabled: false
      l1: false
      l1_range: [0.4, 1.8]
      l2: false
      l3: false
      l4: false
    blur:
      enabled: false
      force_type: null
      strength: 0.1
    pixel_shift:
      enabled: true
      max_shift: 5       # max pixels per axis per frame
      strength: 0.1      # scale factor (1.0 = full ±5px, lower = subtler)

camera:
  head_camera_type: D435
  wrist_camera_type: D435
  demo_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data/bench_data
clear_cache_freq: 3
collect_data: true
eval_video_log: true
enable_collision_metrics: false
