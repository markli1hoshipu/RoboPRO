# Object perturbation config: target texture swap + unseen obstacles
render_freq: 0
episode_num: 3
use_seed: false
save_freq: 15
embodiment: [aloha-agilex]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: true
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
  obstacle_density: 15

  object_perturbation:
    target_texture:
      enabled: true
      texture_source: seen          # picks from assets/background_texture/seen
    unseen_obstacles: true          # samples obstacles from task_objects.yml:object_ood

  background_plus:                  # B1+/B2 from robotwin-plus
    enabled: true
    color_tint: true
    tint_range: [0.5, 1.5]
    surface_material: true
    metallic_range: [0.0, 0.8]
    roughness_range: [0.05, 0.95]
    floor_texture: true

camera:
  head_camera_type: D435
  wrist_camera_type: D435
  demo_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data/bench_data
clear_cache_freq: 3
collect_data: true
eval_video_log: true
enable_collision_metrics: false
