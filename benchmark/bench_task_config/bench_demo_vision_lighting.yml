# Vision perturbation — LIGHTING ONLY (L1 tint + L2 direction + L3 specular + L4 shadow)
render_freq: 0
episode_num: 3
use_seed: false
save_freq: 15
embodiment: [aloha-agilex]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
  obstacle_density: 0

  vision_perturbation:
    lighting:
      enabled: true
      l1: true    # diffuse color tint
      l1_range: [0.4, 1.8]
      l2: true    # random light direction
      l3: true    # specular/shininess variation
      l4: true    # shadow toggle
    blur:
      enabled: false
      force_type: null
      strength: 0.1
    pixel_shift:
      enabled: false
      max_shift: 5
      strength: 0.1

camera:
  head_camera_type: D435
  wrist_camera_type: D435
  demo_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: true
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data/bench_data
clear_cache_freq: 3
collect_data: true
eval_video_log: true
enable_collision_metrics: false
